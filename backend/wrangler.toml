# Cloudflare Workers 部署配置
# 后端 src/index.ts 导出的 `export default { fetch }` 正是 Worker 原生入口，无需包装文件
# 部署：在 backend/ 目录执行 `wrangler deploy`（需先 `wrangler login`）
#
# ⚠️ 关键：必须设 NODE_ENV=production，否则 Worker 启动会尝试 app.listen()（在 edge 上无意义且报错）
# ⚠️ nodejs_compat：@elysiajs/static（/uploads）和 better-auth 依赖 Node API，靠此兼容标志在 Worker 上跑
# ⚠️ 密钥类变量（DATABASE_URL / TURSO_AUTH_TOKEN / BETTER_AUTH_SECRET / CRON_SECRET）请用
#    `wrangler secret put <NAME>` 设置，不要写进本文件
name = "mccsjsblog-backend"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# 路由：把后端挂到独立子域（或你的主域 /api/* 前缀，按需要改）
# routes = [
#   { pattern = "api.mccsjsblog.com", custom_domain = true }
# ]

[vars]
NODE_ENV = "production"
# FRONTEND_URL / ADMIN_URL 也建议走 secret 或在此填写（CORS 生产环境只放行这两个来源）
# FRONTEND_URL = "https://mccsjsblog.com"
# ADMIN_URL = "https://admin.mccsjsblog.com"

# 观察日志：wrangler tail
# 注意：Worker 是无状态冷启动，Turso 连接每次新建（libSQL HTTP 驱动本身轻量，可接受）
